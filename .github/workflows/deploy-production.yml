name: Deploy – Production

on:
  push:
    branches:
      - main

# Allow only one concurrent production deployment
concurrency:
  group: pages-production
  cancel-in-progress: false

permissions:
  contents: write   # needed to push to gh-pages branch
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to GitHub Pages (production)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set environment to production
        run: sed -i "s/window\.MILO_ENV = .*/window.MILO_ENV = 'production';/" config.js

      - name: Deploy to gh-pages (root)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
          # Preserve the staging subdirectory so it isn't wiped by production deploys
          clean-exclude: |
            staging/
          commit-message: "chore: deploy production build from ${{ github.sha }}"
